# CI workflow — runs on every push and pull request to main/develop.
# Builds a debug APK to verify the project compiles cleanly.
# Does NOT deploy — deployment is handled by release.yml on version tags.

name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup JDK 17 — matches compile/target options in build.gradle.kts
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Setup Gradle — handles wrapper download, caches dependencies
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # Upload APK as artifact so it can be downloaded from the Actions run
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KrinikCam-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
